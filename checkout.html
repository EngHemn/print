<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Checkout at Shopping Bag - Complete your order securely." />
  <title>Checkout | Shopping Bag</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="page-hero">
      <div class="container fade-in">
        <h1><span class="gradient-text">Checkout</span></h1>
        <p>Complete your order details below</p>
      </div>
    </section>

    <section>
      <div class="container checkout-layout">
        <div class="checkout-form-card glass-card">
          <h3 class="checkout-form-title">Delivery Information</h3>
          <form id="checkout-form">
            <div class="form-group">
              <label for="fullName">Full Name *</label>
              <input type="text" id="fullName" name="fullName" required placeholder="Your full name" />
            </div>
            <div class="form-group">
              <label for="phone">Phone Number *</label>
              <input type="tel" id="phone" name="phone" required placeholder="+964 7XX XXX XXXX" />
            </div>
            <div class="form-group">
              <label>Map location <span class="label-optional">(optional)</span></label>
              <button type="button" id="open-map-picker" class="btn btn-outline btn-block">Select location on map</button>
              <p id="map-picked-label" class="map-picked-label">No pin selected yet</p>
              <input type="hidden" id="mapLat" name="mapLat" />
              <input type="hidden" id="mapLng" name="mapLng" />
            </div>
            <div class="form-group">
              <label for="street">Street Address *</label>
              <input type="text" id="street" name="street" required placeholder="Street, building, apartment" />
            </div>
            <div class="form-group">
              <label for="notes">Notes</label>
              <textarea id="notes" name="notes" placeholder="Any special instructions..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-3d btn-block">Submit Order</button>
          </form>
        </div>

        <aside class="order-summary-card glass-card fade-in">
          <h3>Order Summary</h3>
          <div id="order-summary"></div>
          <div class="summary-total">
            <span>Total</span>
            <span id="checkout-total">IQD 0</span>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div id="map-picker-modal" class="modal map-picker-modal" aria-hidden="true">
    <div class="modal-overlay map-picker-overlay"></div>
    <div class="modal-content glass-card map-picker-content">
      <button type="button" class="modal-close map-picker-close" aria-label="Close map">&times;</button>
      <h3>Select delivery location</h3>
      <p class="map-picker-hint">Tap the map to place your delivery pin</p>
      <div id="checkout-map" class="checkout-map"></div>
      <button type="button" id="confirm-map-location" class="btn btn-primary btn-3d btn-block" disabled>Use this location</button>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="js/checkout.js"></script>
</body>
</html>
