<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Admin | Shopping Bag</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="admin-body">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-brand">
      <img src="images/logo.png" alt="Shopping Bag" />
      <span class="gradient-text">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a href="admin-dashboard.html" class="sidebar-link" data-page="dashboard">📊 Dashboard</a>
      <a href="admin-dashboard.html#categories" class="sidebar-link" data-page="categories">📁 Categories</a>
      <a href="admin-products.html" class="sidebar-link" data-page="products">🛍️ Products</a>
      <a href="admin-dashboard.html#orders" class="sidebar-link" data-page="orders">📦 Orders</a>
    </nav>
    <button class="btn btn-outline btn-sm" id="logout-btn">Logout</button>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-start">
        <button class="admin-menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <h2>Products</h2>
      </div>
      <div class="admin-topbar-actions">
        <a href="admin-product-form.html" class="btn btn-primary btn-3d">+ Add Product</a>
      </div>
    </div>

    <div class="products-toolbar glass-card">
      <div class="products-toolbar-filters">
        <div class="form-group products-search-group">
          <label for="product-search" class="sr-only">Search products</label>
          <input type="search" id="product-search" placeholder="Search by name or description…" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <div id="product-filter-dropdown"></div>
        </div>
      </div>
      <p class="products-count" id="products-count">—</p>
    </div>

    <div class="admin-panel glass-card admin-panel-relative">
      <div class="state-message loading-state" id="products-loading" role="status">
        <span class="loading-spinner" aria-hidden="true"></span>
        <p>Loading products…</p>
      </div>

      <div class="state-message error-state admin-alert" id="products-error" hidden role="alert">
        <p>Could not load products.</p>
        <button type="button" class="btn btn-sm btn-outline" id="products-retry">Try again</button>
      </div>

      <div class="state-message empty-state" id="products-empty" hidden role="status">
        <p>No products yet.</p>
        <a href="admin-product-form.html" class="btn btn-primary btn-3d">+ Add Product</a>
      </div>

      <div id="products-table-wrap" hidden>
        <div class="admin-table-wrap">
          <table class="admin-table admin-table-products">
            <thead>
              <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Quantity / Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th>Gallery</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/admin-products.js"></script>
</body>
</html>
