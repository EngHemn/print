<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your shopping cart at Shopping Bag Erbil." />
  <title>Cart | Shopping Bag</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="cart-drawer"></div>

  <main>
    <section class="page-hero">
      <div class="container fade-in">
        <h1>Shopping <span class="gradient-text">Cart</span></h1>
        <p>Review your items before checkout</p>
      </div>
    </section>

    <section>
      <div class="container cart-layout">
        <div class="cart-items" id="cart-items"></div>
        <aside class="cart-summary glass-card fade-in">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Total</span>
            <span id="cart-total">IQD 0</span>
          </div>
          <a href="checkout.html" class="btn btn-primary btn-3d btn-block">Proceed to Checkout</a>
          <a href="shop.html" class="btn btn-outline btn-block" style="margin-top:0.75rem">Continue Shopping</a>
        </aside>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script type="module" src="js/cart-page.js"></script>
</body>
</html>
